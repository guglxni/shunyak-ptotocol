name: Feature Request
description: Propose a new feature or enhancement
title: "feat: <short description>"
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: Describe the expected behavior and implementation direction.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: List alternatives and trade-offs considered.
    validations:
      required: false
  - type: textarea
    id: impact
    attributes:
      label: Impacted Areas
      description: Mention affected modules (frontend/api/agent/contracts/docs).
    validations:
      required: false
